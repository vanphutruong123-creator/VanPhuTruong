<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Caesar Cipher</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
</head>
<body>
    <div class="container mt-5">
        <table class="table table-bordered">
            <tr>
                <td style="font-size: 25px; font-weight: bold; color: blue;">
                    CAESAR CIPHER (màu xanh) ENCRYPTION
                </td>
                <td style="font-size: 25px; font-weight: bold; color: blue;">
                    DECRYPTION
                </td>
            </tr>
            <tr>
                <td>
                    <form action="/encrypt" method="POST">
                        <div class="mb-3">
                            <label class="form-label">Plain text:</label>
                            <input type="text" name="inputPlainText" class="form-control" placeholder="Input Plain Text" required autofocus>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Key:</label>
                            <input type="number" name="inputKey" class="form-control" placeholder="Input Key" required>
                        </div>
                        <button type="submit" class="btn btn-primary">Encrypt</button>
                    </form>
                </td>
                <td>
                    <form action="/decrypt" method="POST">
                        <div class="mb-3">
                            <label class="form-label">Cipher text:</label>
                            <input type="text" name="inputCipherText" class="form-control" placeholder="Input Cipher Text" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Key:</label>
                            <input type="number" name="inputKey" class="form-control" placeholder="Input Key" required>
                        </div>
                        <button type="submit" class="btn btn-success">Decrypt</button>
                    </form>
                </td>
            </tr>
        </table>
    </div>
</body>
</html>
